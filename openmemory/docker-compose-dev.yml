services:
  om-store:
    image: qdrant/qdrant
    container_name: om-store
    hostname: om-store
    ports:
      - "6333:6333"
    volumes:
      - mem0_storage:/mem0/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - default
  om-mcp:
    image: mem0/openmemory-mcp
    container_name: om-mcp
    hostname: om-mcp
    build: api/
    environment:
      - USER=${USER:-user}
    env_file:
      - .env
    depends_on:
      om-store:
        condition: service_healthy
    ports:
      - "8765:8765"
    # For live reload with local source, replace named volume with bind mount:
    #   volumes:
    #     - ./api:/usr/src/openmemory
    #   command: sh -c "uvicorn main:app --host 0.0.0.0 --port 8765 --reload --workers 4"
    command: >
      sh -c "uvicorn main:app --host 0.0.0.0 --port 8765 --workers 4"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - default
  om-ui:
    image: mem0/openmemory-ui:latest
    container_name: om-ui
    hostname: om-ui
    build:
      context: ui/
      dockerfile: Dockerfile
    depends_on:
      om-mcp:
        condition: service_healthy
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_USER=${USER:-user}
      - NEXT_LOCAL_API_URL=http://om-mcp:8765
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - default

networks:
  default:
    name: docker_default
    external: true

volumes:
  mem0_storage:
