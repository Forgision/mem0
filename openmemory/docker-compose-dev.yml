networks:
  default:
    name: docker_default
    external: true

mem0_store:
    image: qdrant/qdrant
    container_name: om-store
    ports:
      - "6333:6333"
    volumes:
      - mem0_storage:/mem0/storage
    network:
     - default

  om-mcp:
    image: mem0/om-mcp
    hostname: om-mcp
    container_name: om-mcp
    build: api/
    environment:
      - USER
      - API_KEY
    env_file:
      - api/.env
    depends_on:
      - mem0_store
    ports:
      - "8765:8765"
    # For live reload with local source, replace named volume with bind mount:
    #   volumes:
    #     - ./api:/usr/src/openmemory
    #   command: sh -c "uvicorn main:app --host 0.0.0.0 --port 8765 --reload --workers 4"
    command: >
      sh -c "uvicorn main:app --host 0.0.0.0 --port 8765 --workers 4"
    network:
     - default

  om-ui:
    container_name: om-ui
    build:
      context: ui/
      dockerfile: Dockerfile
    image: mem0/om-ui:latest
    hostname: om-ui
    ports:
      - "3000:3000"
    env_file:
      - ui/.env
    environment:
      - NEXT_PUBLIC_USER_ID=${USER}
      - NEXT_LOCAL_API_URL=http://om-mcp:8765
    network:
     - default

volumes:
  mem0_storage:
